<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebPad — HTML / CSS / JS Playground</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111218;
      --surface:   #17191f;
      --surface2:  #1e2029;
      --border:    #2a2d3a;
      --html:      #e8845a;
      --css:       #5ab4e8;
      --js:        #e8c95a;
      --green:     #5ae8a0;
      --red:       #e85a7a;
      --muted:     #3d4157;
      --text:      #c8cfe8;
      --text-dim:  #565d7a;
      --font-mono: 'Fira Code', monospace;
      --font-ui:   'Syne', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow: hidden; }

    /* grain */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.022; pointer-events: none; z-index: 9999;
    }

    /* ── APP SHELL ── */
    .app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 10;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-ui); font-weight: 700; font-size: 16px;
      letter-spacing: -0.03em;
    }
    .logo-badges { display: flex; gap: 3px; }
    .logo-badge {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .lb-h { background: var(--html); }
    .lb-c { background: var(--css); }
    .lb-j { background: var(--js); }

    .header-center {
      display: flex; align-items: center; gap: 6px;
    }

    .layout-btn {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-mono); font-size: 11px;
      padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-dim);
      cursor: pointer; transition: all 0.15s;
    }
    .layout-btn:hover, .layout-btn.active {
      border-color: var(--muted); color: var(--text);
      background: var(--surface2);
    }
    .layout-btn.active { color: var(--text); }

    .header-actions { display: flex; align-items: center; gap: 8px; }

    .btn {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-ui); font-size: 13px; font-weight: 600;
      padding: 7px 16px; border-radius: 8px; border: none;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em;
    }
    .btn-run { background: var(--green); color: #0d1a12; }
    .btn-run:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-run:active { transform: none; }

    .btn-ghost {
      background: transparent; color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    .btn-submit {
      background: transparent; color: var(--css);
      border: 1px solid var(--css);
    }
    .btn-submit:hover { background: rgba(90,180,232,0.08); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── WORKSPACE ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      height: 100%;
      overflow: hidden;
      transition: grid-template-columns 0.3s ease;
    }
    .workspace.layout-preview { grid-template-columns: 0fr 1fr; }
    .workspace.layout-editors { grid-template-columns: 1fr 0fr; }

    /* ── EDITORS SIDE ── */
    .editors-side {
      display: grid;
      grid-template-rows: 1fr 1fr 1fr;
      border-right: 1px solid var(--border);
      overflow: hidden;
      transition: grid-template-rows 0.25s ease;
    }

    /* ── SINGLE EDITOR PANE ── */
    .editor-pane {
      display: flex; flex-direction: column;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
    }
    .editor-pane:last-child { border-bottom: none; }

    .pane-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px;
      height: 34px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .pane-tab {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.04em;
    }
    .tab-dot { width: 8px; height: 8px; border-radius: 50%; }
    .tab-dot.html { background: var(--html); box-shadow: 0 0 6px var(--html); }
    .tab-dot.css  { background: var(--css);  box-shadow: 0 0 6px var(--css); }
    .tab-dot.js   { background: var(--js);   box-shadow: 0 0 6px var(--js); }

    .pane-collapse {
      background: none; border: none; color: var(--text-dim);
      font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 4px;
      transition: color 0.15s;
    }
    .pane-collapse:hover { color: var(--text); }

    .editor-wrap {
      display: flex; flex: 1; overflow: hidden;
    }

    .line-nums {
      padding: 12px 0;
      min-width: 40px;
      text-align: right; padding-right: 10px;
      font-family: var(--font-mono); font-size: 12px; line-height: 1.65;
      color: var(--muted);
      select: none;
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden; flex-shrink: 0;
    }

    textarea.code-input {
      flex: 1; resize: none;
      background: var(--surface);
      color: var(--text);
      border: none; outline: none;
      font-family: var(--font-mono); font-size: 12.5px; line-height: 1.65;
      padding: 12px 14px 12px 12px;
      tab-size: 2;
      overflow-y: auto; overflow-x: auto;
      white-space: pre;
    }
    textarea.code-input.html-ta { caret-color: var(--html); }
    textarea.code-input.css-ta  { caret-color: var(--css); }
    textarea.code-input.js-ta   { caret-color: var(--js); }

    textarea.code-input::selection { background: rgba(255,255,255,0.08); }
    textarea.code-input::-webkit-scrollbar { width: 5px; height: 5px; }
    textarea.code-input::-webkit-scrollbar-track { background: transparent; }
    textarea.code-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* collapsed pane */
    .editor-pane.collapsed { grid-row: auto; }
    .editor-pane.collapsed .editor-wrap { display: none; }
    .editor-pane.collapsed .pane-header { border-bottom: none; }

    /* ── PREVIEW SIDE ── */
    .preview-side {
      display: flex; flex-direction: column; overflow: hidden; background: #fff;
    }

    .preview-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; height: 34px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .preview-label {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase;
    }
    .preview-url {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim); background: var(--bg);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 2px 10px;
    }

    iframe#preview {
      flex: 1; border: none; width: 100%; background: #fff;
    }

    /* ── CONSOLE ── */
    .console-pane {
      height: 140px; flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex; flex-direction: column;
      transition: height 0.2s;
    }
    .console-pane.hidden { height: 0; overflow: hidden; border-top: none; }

    .console-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; height: 30px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .console-title {
      font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 8px;
    }
    .console-count {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1px 7px; font-size: 10px; color: var(--text-dim);
    }
    .console-clear {
      background: none; border: none; color: var(--text-dim);
      font-family: var(--font-mono); font-size: 10px; cursor: pointer;
      padding: 2px 6px; border-radius: 4px;
    }
    .console-clear:hover { color: var(--text); }

    #console-output {
      flex: 1; overflow-y: auto; padding: 6px 14px;
      font-family: var(--font-mono); font-size: 11.5px; line-height: 1.6;
    }
    #console-output::-webkit-scrollbar { width: 4px; }
    #console-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-line { padding: 1px 0; display: flex; gap: 10px; align-items: baseline; }
    .log-time { color: var(--text-dim); font-size: 10px; flex-shrink: 0; }
    .log-msg  { color: var(--text); word-break: break-all; }
    .log-line.log-error .log-msg { color: var(--red); }
    .log-line.log-warn  .log-msg { color: var(--js); }
    .log-line.log-info  .log-msg { color: var(--css); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-mono); font-size: 12px;
      padding: 8px 18px; border-radius: 20px;
      opacity: 0; pointer-events: none; transition: all 0.2s;
      white-space: nowrap; z-index: 9998;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── SUBMIT MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      backdrop-filter: blur(5px);
      z-index: 500; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; width: 500px;
      max-width: calc(100vw - 40px);
      transform: translateY(14px); transition: transform 0.2s;
      box-shadow: 0 28px 72px rgba(0,0,0,0.55);
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); margin-bottom: 20px; }
    .field-label { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
    .field-row { margin-bottom: 13px; }
    .modal input, .modal select, .modal textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--font-mono);
      font-size: 12px; padding: 8px 12px; outline: none; transition: border-color 0.15s;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--css); }
    .modal select option { background: var(--surface); }
    .modal textarea { resize: vertical; min-height: 68px; line-height: 1.6; }
    .modal-row { display: grid; grid-template-columns: 120px 1fr; gap: 10px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
    .submit-result {
      margin-top: 12px; padding: 10px 13px; border-radius: 8px;
      font-family: var(--font-mono); font-size: 11.5px; line-height: 1.5;
      display: none; word-break: break-all; white-space: pre-wrap;
    }
    .submit-result.ok  { background: rgba(90,232,160,0.07); border: 1px solid rgba(90,232,160,0.2); color: var(--green); display: block; }
    .submit-result.err { background: rgba(232,90,122,0.07); border: 1px solid rgba(232,90,122,0.2); color: var(--red); display: block; }

    /* run flash */
    @keyframes runPulse {
      0%   { outline: 2px solid transparent; }
      40%  { outline: 2px solid var(--green); }
      100% { outline: 2px solid transparent; }
    }
    .run-flash { animation: runPulse 0.5s ease; }
  </style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-badges">
        <div class="logo-badge lb-h"></div>
        <div class="logo-badge lb-c"></div>
        <div class="logo-badge lb-j"></div>
      </div>
      eQuiz
    </div>

    <div class="header-center">
      <button class="layout-btn active" id="layout-split" title="Split view" style="display: none;">⬛ Split</button>
      <button class="layout-btn" id="layout-editors" title="Editors only" style="display: none;">✏️ Editors</button>
      <button class="layout-btn" id="layout-preview" title="Preview only" style="display: none;">👁 Preview</button>
    </div>

    <div class="header-actions">
      <button class="btn btn-ghost" id="btn-console" style="display: none;">⌨ Console</button>
      <button class="btn btn-ghost" id="btn-clear-all" style="display: none;">Clear</button>
      <button class="btn btn-submit" id="btn-submit" style="display: none;">⬆ Submit</button>
      <button class="btn btn-run" id="btn-run" style="display: none;">▶ Run</button>
    </div>
  </header>

  <!-- WORKSPACE -->
  <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 30px;">
    <p style="font-size: 24px; color: #c2cdf3; text-align: center; max-width: 500px; margin: 0;">Choose your next section for coding questions</p>
    <div style="display: flex; gap: 20px;">
      <button onclick="window.location.href='./webtask.html'" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #2e8b45; color: white; border: none; border-radius: 8px; font-weight: bold; transition: all 0.3s;">Web Coding</button>
      <button onclick="window.location.href='./pytask.html'" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #cfb863; color: #111218; border: none; border-radius: 8px; font-weight: bold; transition: all 0.3s;">Python Coding</button>
    </div>
  </div>
</div>

<script>

// ── LOAD STUDENT INFO FROM QUIZ ──
function loadStudentInfoFromQuiz() {
  const nameInput = document.getElementById('name');
  const emailInput = document.getElementById('email');
  const savedName = localStorage.getItem('quiz_student_name');
  const savedEmail = localStorage.getItem('quiz_student_email');
  
  if (savedName) {
    nameInput.value = savedName;
  }
  if (savedEmail) {
    emailInput.value = savedEmail;
  }
  
}

// Auto-run on load
loadStudentInfoFromQuiz();

</script>
</body>
</html>
